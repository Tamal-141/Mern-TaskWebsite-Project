name: build and lint

on:
    push:
        branches: [main, dev]
        pull_request:
            branches: [main, dev]

            jobs:
                build and lint:
                    runs-on: ubuntu-latest

                    steps:
                        - name: Checkout repo
                        uses: actions/checkout@v3

                        - name: Setup Node blah blah
                        uses: actions/setup-node@v3
                        with:
                            node-version: 20

                         -name: install backed dependency
                         working directory: server
                         run npm : ci

                         -name : lint backend
                         working directory: server
                         run: npm run lint -- --max warnings=0

                         -name: install frontend dependency
                         working directory: client
                         run: npm run ci

                         -name: lint frontend 
                         working directory: client
                         run:
                            npm run lint -- --max warnings=0

                        -name: build backend image
                        run: docker build -t backemd ./server

                        -name: build frontend image
                        run: docker build -t frontend ./client

                        deploy:
                            needs: build and lint
                            if: github event name == 'push'
                            runs-on: ubuntu latest
                            steps:
                                -name: checkout (optional)
                                uses: actions/checkout@v4

                                -name: add EC2 instance to known hosts
                                run: |
                                mkdir -p ~/.ssh
                                ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
                                env:
                                    EC2_HOST: ${{ secrets.E2_HOST }}
                                    EC2_USER: ${{ secrets.EC2_USER }} 
                                    EC2_KEY: ${{ secrets.EC2_KEY }}
                                run: |  ssh -i ec2_key.pem ${EC2_USER}@${EC2_HOST} << EOF 
                                 set -e
                                  cd "${EC2_APP_DIR}"
                                 git fetch --all
                                 git reset --hard origin/main
                                 docker compose up -d --build
                                 docker image prune -f
                                 docker compose ps
                                 EOF
                                    
                                
    

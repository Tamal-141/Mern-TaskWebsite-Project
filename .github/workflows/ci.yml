name: build-and-lint

# triggers: define when this workflow should run
# trigger on push to these branches
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

    # define a job (multiple jobs also)
jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: devops-youtube-course-2025/server
        run: npm ci

      - name: Lint backend
        working-directory: devops-youtube-course-2025/server
        run: npm run lint -- --max-warnings=0

      - name: Install frontend dependencies
        working-directory: devops-youtube-course-2025/client
        run: npm ci

      - name: Lint frontend
        working-directory: devops-youtube-course-2025/client
        run: npm run lint -- --max-warnings=0

      - name: Build backend image
        run: docker build -t backend ./devops-youtube-course-2025/server

      - name: Build frontend image
        run: docker build -t frontend ./devops-youtube-course-2025/client

  deploy:
    needs: build-and-lint
    if: github.event_name == 'push' 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ${{ secrets.EC2_APP_DIR }}
            git fetch --all
            git reset --hard origin/main
            docker-compose up -d --build
            docker image prune -f
            docker-compose ps
